url: https://olivethree.github.io/rcicrely

template:
  bootstrap: 5
  bslib:
    primary: "#0054AD"
    base_font: {google: "Source Sans 3"}
    heading_font: {google: "Source Sans 3"}
    code_font: {google: "JetBrains Mono"}

home:
  title: rcicrely — reliability assessment for reverse-correlation CIs
  description: >
    Within-condition consistency and between-condition discriminability
    for reverse-correlation classification images, without a second-phase
    trait-rating study.

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]

reference:
  - title: "Loading data"
    desc: "Read CI images, build the signal matrix, load region masks."
    contents:
      - load_signal_matrix
      - read_cis
      - extract_signal
      - read_noise_matrix
      - face_mask
      - load_face_mask

  - title: "CI from raw responses"
    desc: "Compute individual CIs from trial-level response data."
    contents:
      - ci_from_responses_2ifc
      - ci_from_responses_briefrc

  - title: "Within-condition reliability"
    desc: "How consistent is a single condition's CI?"
    contents:
      - rel_split_half
      - rel_icc
      - run_within

  - title: "Influence screening"
    desc: "Producer-level outlier diagnostics (not reliability metrics)."
    contents:
      - rel_loo
      - rel_loo_z

  - title: "Between-condition inference"
    desc: "Is condition A's CI distinguishable from condition B's?"
    contents:
      - pixel_t_test
      - rel_cluster_test
      - rel_dissimilarity
      - compare_dissimilarity
      - run_between

  - title: "Per-producer signal"
    desc: "Informational value with trial-count-matched reference."
    contents:
      - infoval

  - title: "Visualisation helpers"
    desc: "Pixel-wise agreement maps and other plot helpers."
    contents:
      - plot_agreement_map

articles:
  - title: "Tutorial"
    contents:
      - tutorial
